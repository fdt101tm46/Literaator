Omar Khayyam was a mathematician, an astronomer, and a philosopher in eleventh-century Persia — a man who calculated the length of the solar year to a precision not matched in Europe for five centuries, who reformed the Persian calendar, who wrote treatises on algebra. He also wrote quatrains — rubaiyat, four-line poems — that were known in Persia but not widely celebrated until an English eccentric named Edward FitzGerald translated them, loosely, beautifully, unfaithfully, in 1859, and produced one of the most popular books of poetry in the English language.

The Rubaiyat as FitzGerald arranged it is a long meditation on wine, mortality, and the futility of asking the universe to explain itself. It is not a translation in any strict sense — FitzGerald selected, rearranged, combined, and reinvented Khayyam's quatrains, producing something that is neither English nor Persian but exists in the space between, like a conversation between two men separated by seven centuries and united by the conviction that life is short and wine is good.

The themes are simple. You will die. Everyone you love will die. The palace will crumble. The king will rot. The rose you admired this morning will be dust by nightfall. Knowing this, what do you do?

Khayyam's answer: drink wine. Sit in a garden. Hold the beloved's hand. Watch the moon. Do not waste the day on theology — the scholars who debate God's nature will die as surely as the drunkard in the gutter, and the drunkard had more fun. Do not plan for tomorrow — tomorrow is a letter from a dead man's hand, and you cannot read it until you are dead yourself. The present moment is the only estate you own. Furnish it with pleasure.

This is not hedonism. It is — or FitzGerald makes it — a philosophy of defiance. The universe is beautiful and indifferent. The stars burn without purpose. The potter's wheel turns, shaping vessels that will break. You are one of those vessels. You were not consulted about your shape. You will not be consulted about your breaking. In the meantime, the wine is here, and the garden is here, and the moon is doing what the moon does, and you might as well pay attention.

The Moving Finger writes; and, having writ, / Moves on: nor all thy Piety nor Wit / Shall lure it back to cancel half a Line, / Nor all thy Tears wash out a Word of it.

That quatrain has been quoted at funerals, in novels, in speeches, in hospital rooms. It says: what is done is done. You cannot undo the past. You cannot rewrite the record. The finger writes and moves on, and the ink is permanent, and your tears are water, and water does not erase ink.

Khayyam died around 1131. FitzGerald died in 1883. The first edition of the Rubaiyat sold almost nothing — the pamphlets were placed in a penny box outside a bookshop. Dante Gabriel Rossetti found a copy. He showed it to Swinburne. They showed it to everyone they knew. The second edition sold out. The third became a phenomenon. By the turn of the century, the Rubaiyat was one of the most widely owned books in the English-speaking world — Omar Khayyam Clubs were founded, illustrated editions were commissioned, and a Persian mathematician who died eight centuries earlier became one of the most quoted poets in English.

The irony would have pleased Khayyam. Or FitzGerald. Or whoever is actually speaking in these verses — the eleventh-century Persian who watched the stars from a rooftop in Nishapur, or the nineteenth-century Englishman who sat in a Suffolk rectory and heard, across the centuries, a voice telling him to put down the book and open the wine.

A Book of Verses underneath the Bough, / A Jug of Wine, a Loaf of Bread — and Thou / Beside me singing in the Wilderness — / Oh, Wilderness were Paradise enow!

The garden is here. The wine is here. The beloved is here. The finger writes and moves on. Drink.`},
{id:"demons",cat:"lit",bookTitle:"Demons",author:"Fyodor Dostoevsky",region:"russian",readTime:"16 min",year:"1872",words:945,preview:"A charismatic nihilist returns to a provincial town and sets it on fire — philosophically, then literally. Dostoevsky's prophetic nightmare about what happens when ideas escape the lecture hall.",summary:`In a provincial Russian town, sometime in the 1860s, a group of young radicals is plotting revolution. Their leader is Pyotr Stepanovich Verkhovensky — a small, restless, perpetually smiling man who talks too fast, lies instinctively, and manipulates everyone he meets with the casual skill of a man playing cards with children. He is organizing a cell. The cell's purpose is destruction — not of the government specifically, but of everything: morality, religion, family, art, the past, the future. "We will proclaim destruction," Pyotr says. "We'll set fires. We'll set legends going."

But Pyotr is not the novel's center. The center is Nikolai Vsevolodovich Stavrogin.

Stavrogin is the most terrifying character Dostoevsky ever created. He is tall, handsome, aristocratic, possessed of extraordinary physical courage and intellectual brilliance. Women fall in love with him. Men follow him. He has traveled, fought, studied, experienced everything the world offers. And he is empty. Not evil — empty. He has consumed every experience, every philosophy, every sensation, and none of them have left a mark. He is a man without a self, a vacuum in human form, and everyone around him projects their own desires onto his blankness.

Pyotr sees him as the figurehead of the revolution — a charismatic leader, a prince of chaos. Shatov, a former disciple, has taken from Stavrogin a passionate belief in the Russian people and in God — a belief Stavrogin planted in him and then abandoned, the way you might give a child a match and walk away. Kirillov, another disciple, has taken from Stavrogin the opposite — the conviction that God does not exist, and that the highest act of human will is suicide, because only by killing yourself for no reason do you prove that you are truly free.

Stavrogin gave each of them their philosophy. He believes none of it. He distributed ideas the way a rich man distributes coins — carelessly, to see what happens.

The novel unfolds as a series of catastrophes, each one triggered by the ideas Stavrogin scattered. Pyotr manipulates the town's liberals — well-meaning, ineffectual intellectuals who host parties and discuss reform — into unwitting complicity. He stages a fete that degenerates into chaos. He encourages a group of workers to riot. He poisons relationships, spreads rumors, creates the conditions for maximum disorder.

At the center of Pyotr's plot is a murder. Shatov, who has broken with the cell, must be killed — partly to silence him, partly to bind the remaining members through shared guilt. Pyotr organizes the killing with bureaucratic efficiency. They meet at night, by a pond. Shatov is shot, weighed with stones, and sunk. The murder is clumsy, horrible, and pointless — Shatov was not going to betray them. He had just reconnected with his wife, who arrived that very night with a newborn child. He was going to start over. The killers stand at the pond's edge, shaking, bound together now by blood, exactly as Pyotr intended.

Stavrogin watches all of this from a distance. He does not participate in the murder. He does not stop it. He drifts through the novel like a ghost — visiting Shatov, visiting Kirillov, visiting his secret wife (Marya Lebyadkina, a crippled, half-mad woman he married on a drunken whim), leaving each encounter unchanged. People beg him to act — to lead, to save, to choose a side. He cannot. The emptiness is total.

Kirillov fulfills his philosophy. He shoots himself — not from despair but from theory. His suicide is meant to prove that man can transcend the fear of death and become God. Pyotr uses Kirillov's death to cover the group's crimes — Kirillov leaves a suicide note taking responsibility for everything. The philosophical act becomes a bureaucratic convenience. The idea becomes a tool.

The town burns. Not metaphorically — fires break out on the night of the fete, set by Pyotr's agents or by the general chaos he has unleashed. A section of the town goes up in flames. People die. Lembke, the provincial governor, goes mad. The liberals who thought they were hosting intellectual discussions discover they were providing cover for arsonists.

Stavrogin leaves. He goes abroad. He writes a letter to Dasha, a woman who loved him and whom he is incapable of loving back. Then he hangs himself — in an attic, with a silk cord, having smeared soap on his neck to ensure the noose slipped smoothly. The detail is pure Dostoevsky — even Stavrogin's suicide is precise, competent, and empty.

Pyotr escapes. He always escapes. He is on a train to St. Petersburg before the bodies are cold. The revolution continues. The cell is destroyed but the idea survives, because ideas do not die when their carriers die. They move. They mutate. They find new hosts.

Dostoevsky wrote Demons in 1871-72, based partly on the real case of the Nechayev circle — a group of Russian radicals who murdered a member in 1869 to enforce group loyalty. But the novel goes far beyond the case. Dostoevsky saw, forty-five years before 1917, exactly what would happen when revolutionary ideology met Russian nihilism: the destruction would not be limited to the government. It would consume everything — morality, culture, individual conscience, the revolutionaries themselves.

The liberals at the fete thought they were discussing ideas. The ideas were already out of the lecture hall. The ideas had legs and matches and a plan.

Stavrogin hangs in the attic. Shatov lies at the bottom of the pond. Kirillov's brains are on the wall. Pyotr is on the train. The town smolders. The fires Dostoevsky predicted would take another forty-five years to arrive. When they did, they burned for seventy.`},
{id:"hundred-years-solitude-fix",cat:"lit",bookTitle:"The Nose",author:"Nikolai Gogol",region:"russian",readTime:"8 min",year:"1836",words:699,preview:"A man wakes up without his nose. The nose is walking around St. Petersburg in a uniform, outranking its former owner. Nobody finds this as strange as it should be.",summary:`On March 25th, the barber Ivan Yakovlevich cuts into his morning bread and finds a nose. He recognizes it. It belongs to Collegiate Assessor Kovalyov, one of his regular customers. The nose is sitting in the bread, fully formed, slightly greasy. Ivan Yakovlevich tries to throw it away — he wraps it in a rag, carries it through St. Petersburg, drops it off a bridge. A policeman sees him. The nose is confiscated. Nothing is explained.

Meanwhile, Collegiate Assessor Kovalyov wakes up and reaches for his face. Where his nose should be, there is a smooth, flat place. He runs to the mirror. The flat place stares back. He wraps a handkerchief around the lower half of his face and goes out to report the matter to the police.

On the street, he sees his own nose. It is wearing the uniform of a State Councillor — a rank considerably higher than Kovalyov's own. It climbs out of a carriage, walks into a cathedral, and kneels to pray. It has epaulettes. It has a plumed hat. It is, by every visible measure, a more successful member of St. Petersburg society than the man it detached from.

Kovalyov approaches. "Sir — you are my own nose." The Nose turns its head (which is itself a nose) and replies with glacial dignity: "You are mistaken, sir. I am myself." It outranks him. He cannot argue with a State Councillor. He retreats.

He goes to the newspaper to place a classified ad — "Lost: one nose, belonging to Collegiate Assessor Kovalyov" — and the clerk refuses. Too scandalous. He goes to the police. The police are indifferent. He goes home and sits in his chair, noseless, in a city that will not help him because his misfortune is too absurd to be taken seriously and too real to be ignored.

The nose is eventually caught — at the city gates, trying to leave for Riga on a false passport. It is returned to Kovalyov. But it will not stick. He presses it against his face. It falls off. He tries glue. It falls off. He calls a doctor. The doctor examines the space and suggests that Kovalyov might be better off without it — he could sell the nose to the doctor, who would keep it in a jar of alcohol. Kovalyov declines.

One morning, the nose is back. It is on his face, exactly where it should be, as if nothing happened. Kovalyov looks in the mirror, touches it, pulls it — it holds. He goes to the barber. He has a shave. He goes to the café. He flirts with a shopgirl. He is himself again.

Gogol offers no explanation. "But what is strangest," the narrator admits, "what is most incomprehensible of all, is that authors can choose such subjects. I confess, that is completely beyond my grasp." He has written a story about a man losing his nose and refuses to explain it, and the refusal is the story's final joke — because in a world where rank determines reality, where a nose in a uniform outranks the face it came from, where the entire social order is a system of surfaces with nothing behind them, what is there to explain?

Gogol published it in 1836 in Pushkin's literary journal. It was his most purely bizarre work — a story that operates on the logic of dreams, where the impossible is treated with bureaucratic seriousness and the serious is treated as absurd. Kafka, Beckett, and every surrealist who came after owe something to this story — the discovery that the most effective way to describe a mad world is to describe it calmly, as if the madness were normal.

Kovalyov has his nose back. He struts down the Nevsky Prospekt. He tips his hat. He is whole again. He does not ask where it went or why it came back. He does not ask because asking would require acknowledging that the world is not solid, that identity is not fixed, that the face you present to the world might detach itself at any moment and walk away wearing a better uniform.

The nose sits on his face. For now.`},
{id:"prophet-gibran",cat:"lit",bookTitle:"The Prophet",author:"Khalil Gibran",region:"middleeast",readTime:"8 min",year:"1923",words:726,preview:"A man about to leave a city is asked by its people to speak about love, marriage, children, work, death — about everything. He speaks. What he says has been carried in pockets and read at weddings for a hundred years.",summary:`Almustafa has lived in the city of Orphalese for twelve years. He came as a stranger. He is leaving as something more — not a friend exactly, not a teacher, something between the two. A presence. A man who listened. The ship that will carry him home has arrived in the harbor, and the people of Orphalese have gathered to see him off, and they ask him to speak.

They ask about love. He says: love possesses not, nor would it be possessed. "For love is sufficient unto love." Love gives you to yourself. It burns away the parts of you that are not essential. It is not gentle — it threshes you, kneads you, breaks you. "Even as the stone of the fruit must break, that its heart may stand in the sun, so must you know pain."

They ask about marriage. He says: "Let there be spaces in your togetherness." Do not try to make two lives into one life. Stand together but not too close — "for the pillars of the temple stand apart, and the oak tree and the cypress grow not in each other's shadow."

They ask about children. He says the most difficult thing a parent can hear: your children are not your children. "They are the sons and daughters of Life's longing for itself." You can house their bodies but not their souls. You can try to be like them, but do not try to make them like you. "For life goes not backward nor tarries with yesterday."

They ask about work. He says: work is love made visible. If you bake bread with indifference, you bake a bitter bread. If you build a house with hatred, you build a prison. "And all work is empty save when there is love."

They ask about joy and sorrow. He says they are inseparable — "the deeper that sorrow carves into your being, the more joy you can contain." The cup that holds your wine was fired in the potter's oven. Your pain is the chisel that shapes the vessel.

They ask about freedom. About reason and passion. About pain. About self-knowledge. About teaching. About friendship. About talking. About time. About good and evil. About prayer. About pleasure. About beauty. About death.

About death, he says: "For what is it to die but to stand naked in the wind and to melt into the sun?" The river does not fear reaching the sea. "Only when you drink from the river of silence shall you indeed sing. And when you have reached the mountain top, then you shall begin to climb. And when the earth shall claim your limbs, then shall you truly dance."

Almustafa finishes speaking. He walks to the harbor. He boards his ship. The people of Orphalese watch him go. The ship sails. He does not look back.

Gibran wrote The Prophet in English, in New York, in 1923. He was a Lebanese-American painter and writer who had been working on the book, in one form or another, for most of his adult life. He wrote it in a language that is neither prose nor poetry but something between — rhythmic, biblical, incantatory. The sentences have the cadence of scripture without the authority of scripture. They ask. They do not command.

The book sold slowly at first, then faster, then unstoppably. It has sold over a hundred million copies. It is the third-bestselling book of poetry in history, after Shakespeare and Lao Tzu. It is read at weddings, at funerals, at graduations. It is carried in jacket pockets. It is underlined in pencil. It is the book people give to other people when they do not know what to say but feel they must say something.

Gibran died in 1931, at forty-eight, of cirrhosis and tuberculosis, in a hospital in New York. His body was returned to Lebanon and buried in the grotto of a monastery in his hometown of Bsharri, in the mountains above the Qadisha Valley.

Almustafa sails away. The people stand on the shore. The words remain — not on the page but in the space between the reader and the life the reader is trying to live. "A little while, a moment of rest upon the wind, and another woman shall bear me."

The ship disappears. The shore is empty. The words do not disappear.`},
{id:"death-ivan-ilyich",cat:"lit",bookTitle:"The Death of Ivan Ilyich",author:"Leo Tolstoy",region:"russian",readTime:"10 min",year:"1886",words:1068,preview:"A judge falls ill. His life was perfectly ordinary — career, marriage, house, card games. Dying, he discovers that an ordinary life is the worst thing that can happen to a person.",summary:`Ivan Ilyich Golovin is dead. The first chapter tells you this. His colleagues at the courthouse read the obituary, and their first thought — each of them, independently — is: what does his death mean for my career? Whose position opens up? Who moves up? They attend the funeral. They observe the proprieties. Peter Ivanovich, his closest friend, looks at the corpse and thinks: the face seems to say "what had to be done has been done, and done right." Then he goes home and plays cards.

The story goes backward. Ivan Ilyich was born into the Russian professional class — the son of an official, educated in the School of Law, placed in the Ministry of Justice. He was pleasant, capable, and entirely conventional. He did what was expected. He made the right friends. He married the right woman — Praskovya Fyodorovna, who was suitable in every way and whom he did not love, because love was not the point. The point was a correct life.

He rose through the ranks. He became a judge. He bought a house and decorated it with the same taste as everyone else in his circle — the same dark fabrics, the same bronze lamps, the same Japanese plates that all people of a certain class display without knowing why. He played cards. He attended dinners. He judged cases with the satisfying precision of a man applying rules to other people's lives.

One day, while hanging curtains in the new house, he fell from a ladder. He bruised his side. It was nothing. A week later, a strange taste appeared in his mouth. A dull ache in his left side. A heaviness after meals. He went to a doctor. The doctor examined him with the same professional detachment that Ivan Ilyich used in court — listening, nodding, pronouncing. The doctor said: it might be a floating kidney, or it might be a problem with the caecum. The doctor did not say: you are dying. Nobody would say it.

The pain grew. It became constant. It moved from his side to his whole body, to his mind. He could not sleep. He could not work. He sat in his study and tried to think his way through the pain the way he thought his way through legal cases — if the kidney is the problem, then this treatment; if the caecum, then that. The logic did not hold. The pain did not submit to categories.

His wife was irritated by his illness. She had a life to maintain — dinners, concerts, their daughter's engagement. His sickness was an inconvenience. She accused him of not following the doctor's orders. She organized consultations. She managed his illness the way she managed the household — efficiently, impersonally, with the underlying conviction that it was all somehow his fault.

His colleagues visited and played cards. They sat at his bedside and discussed their cases and their promotions, and Ivan Ilyich realized, with a horror that eclipsed the physical pain, that they were doing to him exactly what he had always done to others: they were treating him as an abstraction. His suffering was not real to them. It was a social situation to be navigated — the right words, the right expression, the right duration of visit.

Only Gerasim — a young peasant servant, healthy, clean, cheerful — treated Ivan Ilyich's dying as real. Gerasim held Ivan Ilyich's legs up when the pain was worst. He slept in the room. He said, simply: "We all have to die someday. Why shouldn't I help?" There was no performance in it. Gerasim was not being virtuous. He was being present. He was the only person in the house who was not lying.

Because they were all lying. The central torment of Ivan Ilyich's death is not physical. It is the lie — the pretense that he is not dying, that the treatment is working, that he will recover. The lie separates him from everyone. He cannot speak the truth of his condition because no one wants to hear it. He screams — not from pain but from isolation, from the suffocating loneliness of dying in a room full of people who will not admit what is happening.

Three days before his death, he begins to scream. He screams for seventy-two hours. The sound fills the house. The family endures it. They wait. And in the last hours, something happens. Ivan Ilyich stops screaming. He sees — suddenly, in a flash of clarity — that his life was wrong. Not his illness. His life. The correct career, the correct marriage, the correct house with the correct curtains — all of it was wrong. It was wrong because it was not his. He lived the life that was expected of him, and the expectation was a coffin, and he climbed into it voluntarily, and now the lid is closing.

But in the same moment, he sees that it is possible to make it right. Not the past — the past is done. But the present. The last moment. He looks at his wife, his son, and feels — for the first time — pity. Not for himself. For them. They are still in the coffin. They are still living the correct life. He wants to say: "Forgive me." His mouth forms the wrong word — instead of "forgive," he says "forego." But it does not matter. The intention reaches beyond the word.

"And death? Where is it?" He searched for his former habitual fear of death and could not find it. In place of death there was light. "So that's what it is!" he said aloud. "What joy!"

He died. It took two hours. To him, it was an instant.

Tolstoy wrote it in 1886, during the spiritual crisis that followed War and Peace and Anna Karenina — the crisis that turned him from a novelist into a moralist, a vegetarian, a Christian anarchist, and a man who made shoes in his study while his wife ran the estate. The story is eighty pages long. It contains more truth about dying than most religions manage in a thousand.

Ivan Ilyich hung the curtains. He bruised his side. The bruise became a question. The question became a scream. The scream became silence. The silence became light.

The colleagues play cards. The Japanese plates hang on the wall. The curtains are straight.`},
{id:"things-fall-apart",cat:"lit",bookTitle:"Things Fall Apart",author:"Chinua Achebe",region:"british",readTime:"14 min",year:"1958",words:1452,preview:"An Igbo warrior builds his life through strength and will. Then the missionaries come. Everything he built — the yams, the titles, the order — falls apart. The first great African novel.",summary:`Okonkwo was well known throughout the nine villages and even beyond. His fame rested on solid personal achievements. As a young man of eighteen he had brought honor to his village by throwing Amalinze the Cat in a wrestling match — Amalinze who for seven years had not been thrown. That was the beginning.

Okonkwo is a self-made man in a world where self-making is both possible and necessary. His father, Unoka, was a failure — a lazy, indebted man who played the flute and owed money to everyone in the village and died in disgrace, a debtor's death, thrown into the Evil Forest without proper burial. Okonkwo has spent his entire life running from his father's shadow. He is strong where his father was weak. He is wealthy where his father was poor. He is feared where his father was laughed at. He has three wives, a barn full of yams, two titles in the clan, and the respect of his people.

He has also built himself into a box. Because his father was soft, Okonkwo has made hardness his religion. He does not show emotion — except anger. He does not show tenderness — except to his daughter Ezinma. He beats his wives. He drives his children. When the Oracle declares that Ikemefuna — a boy from another village who has lived in Okonkwo's household for three years, whom Okonkwo loves like a son — must be killed, the elders tell Okonkwo not to participate. He participates. The boy calls him father. Okonkwo cuts him down with a machete, because not to participate would look like weakness, and weakness is the one thing Okonkwo cannot permit in himself.

He does not sleep for days afterward. He does not eat. He shakes with something he refuses to name. Achebe lets you see it: Okonkwo loves. He loves fiercely. But he has taught himself to interpret love as weakness, and weakness as his father, and his father as everything he must destroy. The love is there. The permission to feel it is not.

The world Achebe builds is Umuofia — a cluster of nine Igbo villages in what is now southeastern Nigeria, in the late nineteenth century, before the Europeans came. Achebe describes this world from the inside, without apology and without exoticism. The yam harvest. The wrestling matches. The week of peace before planting. The Oracle of the Hills and Caves. The egwugwu — masked spirits of the ancestors who settle disputes. The titled men who govern by consensus. The proverbs that carry moral weight: "When the moon is shining the cripple becomes hungry for a walk." "The lizard that jumped from the high iroko tree to the ground said he would praise himself if no one else did."

This is not a primitive society. It is a complex, functioning civilization with its own law, its own religion, its own art, its own cruelties and its own justice. Achebe wrote the novel specifically to counter the European narrative — Heart of Darkness, the colonial adventure stories — that portrayed Africa as a blank space, a darkness, a place without history. Umuofia has history. It has culture. It has people who argue about the existence of God at palm-wine ceremonies the way Europeans argue about it in salons.

It also has fault lines. Okonkwo accidentally kills a clansman during a funeral celebration — his gun explodes and a piece of iron pierces a boy's heart. It is a female crime (accidental, not intentional), but the punishment is exile: seven years. Okonkwo packs his family and goes to his mother's village, Mbanta. He is devastated. He has been ripped from the place where he built his name.

During his exile, the missionaries arrive. They come first to Mbanta — white men with a strange religion, speaking through an Igbo interpreter. They talk about one God, about Jesus, about heaven and hell. The elders are skeptical but tolerant. They give the missionaries a piece of land in the Evil Forest — the dumping ground for the diseased and the cursed — assuming the forest will kill them. The forest does not kill them. The church thrives.

The first converts are the outcasts — the osu, the untouchables of Igbo society, people born into a hereditary caste of temple servants who are forbidden to marry free citizens, to cut their hair, to participate in village life. The missionaries offer them equality. For the osu, Christianity is not spiritual liberation. It is social revolution. They have nothing to lose.

Then the converts include Nwoye — Okonkwo's eldest son. The boy who flinched when Ikemefuna was killed. The boy who heard something in the missionaries' hymns that answered a question he could not ask in his father's house — the question of why innocent people suffer, why boys are killed because an oracle says so, why the twins his mother bore were thrown into the forest to die because custom demanded it. Nwoye does not hate his father. He is afraid of his father. He is afraid of becoming his father. He walks into the church and does not come back.

Okonkwo returns from exile. Umuofia has changed. The church is established. A court has been built. A District Commissioner governs. The clan's authority has been undercut — not destroyed, but hollowed out. The egwugwu still meet, but their judgments can be appealed to the white man's court. The titled men still gather, but the converts no longer obey. The center has shifted.

Okonkwo wants war. He has always wanted war — war is the answer his personality provides to every question. He burns a church after a convert unmasks an egwugwu, which is the greatest sacrilege in Igbo religion. The District Commissioner invites the village leaders to a meeting. It is a trap. They are handcuffed, humiliated, fined. The village pays the fine. They are released.

The clan gathers to decide what to do. A court messenger arrives — an African in the colonial service, one of the men the villagers call "Ashy-Buttocks" because they are neither white nor truly local, servile to the colonizers and arrogant to their own people. The messenger orders the meeting to disperse. Okonkwo draws his machete and cuts the messenger's head off.

He looks at the crowd. Nobody moves. Nobody joins him. He sees it in their faces: they will not fight. The clan will submit. The world he built — the world of yam barns and wrestling matches and ancestral spirits — is over. The thing that fell apart was not a wall or a roof. It was the agreement that held the wall up, the consensus that gave the roof its weight.

Okonkwo goes home. He hangs himself from a tree behind his compound. In Igbo custom, suicide is an abomination — the body cannot be touched by clansmen. It must be cut down by strangers. The man who spent his life building honor dies in the one way that strips it all away.

The District Commissioner arrives. He has been writing a book about his experiences pacifying the tribes. He considers Okonkwo's story. He decides it might make an interesting paragraph — perhaps a whole chapter. The book will be called The Pacification of the Primitive Tribes of the Lower Niger.

A paragraph. A whole chapter. A man's entire life — the wrestling, the yams, the titles, the exile, the return, the machete, the rope — reduced to an anecdote in a colonial administrator's memoir. The last sentence of the novel is the title of the commissioner's book, and it is the most devastating closing line in African literature, because it shows you exactly what colonialism does: it takes a civilization and makes it a footnote.

Achebe published it in 1958, two years before Nigerian independence. He was twenty-seven. The title comes from Yeats: "Things fall apart; the centre cannot hold." The novel has sold over twenty million copies and has been translated into over sixty languages. It was the book that opened the door — the first African novel to be read worldwide, the proof that African literature existed and had always existed, that the stories were there before the missionaries came, that the people had names before the District Commissioner gave them numbers.

Okonkwo hangs from the tree. The clan cannot cut him down. The commissioner writes his paragraph. The yams rot in the barn. The egwugwu masks hang in the dark. The center did not hold. It was never supposed to hold forever. But while it held, it was a world — complete, complex, human — and Achebe made sure that when it fell, it made a sound that the whole earth could hear.`},
{id:"white-nights",cat:"lit",bookTitle:"White Nights",author:"Fyodor Dostoevsky",region:"russian",readTime:"10 min",year:"1848",words:1283,preview:"Four white nights in St. Petersburg. A lonely dreamer meets a girl on a bridge. She is waiting for someone else. He falls in love anyway. The someone else comes back.",summary:`He is a dreamer. He does not give us his name. He lives in St. Petersburg in a small apartment with a housekeeper named Matrona and a spider in the corner of the window. He has lived in the city for eight years and knows nobody. He recognizes buildings the way other people recognize friends — he walks past a house and the house seems to greet him, and he greets it back. He is twenty-six years old and has never spoken to a woman outside of transactional necessity.

It is June. The white nights — those weeks when the sun barely sets over St. Petersburg, when midnight is a pale blue dusk and the city floats in a luminous half-light that makes everything look like a dream. The city empties — the wealthy go to their dachas, the fashionable go to the countryside. The dreamer walks the embankment alone, watching the sky refuse to darken.

On the first night, he sees a girl leaning on the railing of a canal bridge, crying. He approaches. She is frightened — a man has been following her. The dreamer chases the man away. The girl thanks him. They walk. They talk. He is awkward, excessive, bubbling over with words — years of unsaid things pouring out in a flood. She laughs at him. She does not laugh cruelly. She laughs the way you laugh at a puppy that has just discovered its own tail.

Her name is Nastenka. She is seventeen. She lives with her blind grandmother, who pins Nastenka's dress to her own so the girl cannot leave the house without permission. Nastenka's world is as small as the dreamer's, but where his smallness is internal — a vast fantasy life with no external expression — hers is physical: the house, the grandmother, the pin.

A year ago, a lodger lived upstairs. He lent Nastenka books. He talked to her. He was kind. When he left the city, he promised to return in exactly one year and marry her. The year is up. She has been coming to the bridge every night, waiting for him. He has not come.

The dreamer listens. He understands immediately what is happening: he is falling in love with a girl who is waiting for another man. He knows this will end in pain. He falls anyway. He cannot help it. Nastenka is the first person who has ever listened to him, laughed at his jokes, taken his arm as they walked along the canal. The touch of her hand through his sleeve is the most physical contact he has had in eight years.

On the second night, he tells her his story — the life of a dreamer. How he walks the streets and invents entire novels in his head. How he has imaginary friends, imaginary lovers, imaginary adventures. How he lives more vividly in fantasy than in reality, and how the fantasy has slowly, imperceptibly replaced reality altogether, until the real world feels like a faded photograph and the dream world is the only place with color. He describes it with Dostoevsky's early, intoxicated prose — breathless, confessional, swinging between ecstasy and self-loathing. Nastenka listens. She says: "You tell your story so well I feel I must love you a little."

A little. The word drops into the dreamer's chest like a coin into a well. He will spend the rest of the story listening for the echo.

On the third night, the lodger has still not come. Nastenka is losing hope. The dreamer comforts her. He helps her write a letter to the lodger — a letter begging him to keep his promise. The dreamer delivers the letter himself. He is helping the woman he loves reach the man she loves. He knows exactly what he is doing. He does it anyway, because her happiness matters more to him than his own, which is either the purest form of love or the most complete form of self-destruction, and Dostoevsky suggests it is both.

On the fourth night — the last white night — the lodger has not replied. Nastenka weeps. The dreamer cannot bear it. He confesses: I love you. I have loved you since the first night. I know you love him. I am not asking you to love me instead. I am just telling you, because not telling you is harder than telling you and being refused.

Nastenka looks at him. Something shifts. She says: perhaps she does love him. Perhaps the lodger is gone and the dreamer is here, and being here is worth more than being remembered. She takes his hands. The dreamer is delirious with joy. They walk along the canal. The sky is white. The city shimmers. For fifteen minutes, the dreamer holds the only happiness he has ever known.

A man appears on the bridge. Nastenka freezes. She drops the dreamer's hands. "It's him!" she whispers. She runs to the lodger. She throws her arms around him. She turns back to the dreamer, presses his hand, says something — a word, a thank you, a goodbye — and she is gone.

The dreamer walks home. The white night is ending. The morning arrives — gray, drizzling, the ugliness of a St. Petersburg day after the enchantment of a St. Petersburg night. Matrona brings him tea. The spider is in the corner. The room is the same room it was four days ago, and the dreamer is the same dreamer, except that now he knows what it feels like to hold someone's hand, and the knowledge makes the solitude worse than it was before.

A letter arrives from Nastenka. She apologizes. She asks him to forgive her. She says: "Do not blame me. I am happy." She asks him to love her as a sister. She asks him not to forget her.

The dreamer's response — the novel's last lines — is the most Dostoevskian sentence he ever wrote at twenty-six: "But that I should feel resentment against you, Nastenka! That I should cast a dark cloud over your serene, untroubled happiness! That I should, by my bitter reproaches, cause you unease, sadden your heart, poison it with secret remorse! ... May your sky be clear, may your sweet smile be bright and untroubled, and may you be blessed for that moment of bliss and happiness which you gave to another lonely and grateful heart! My God, a whole moment of happiness! Is that too little for the whole of a man's life?"

A whole moment. Four nights. A hand on a bridge in the white light. Is that too little for the whole of a man's life?

Dostoevsky published it in 1848, when he was twenty-six — the same age as the dreamer. Eight months later, he was arrested for membership in a radical discussion group, sentenced to death, led to the scaffold, and reprieved at the last moment. He spent four years in a Siberian prison camp. He came out a different man. The dreamer on the bridge became the author of Crime and Punishment, The Idiot, Demons, and The Brothers Karamazov.

But this was first. This was the young man, before the scaffold, before Siberia, before the epilepsy and the gambling debts and the suffering that would fill five thousand pages. This was Dostoevsky at his most tender — a boy on a bridge, in love with a girl who loved someone else, standing in the white light of a city that would not let the night fall.

The sky is white. Nastenka is gone. The dreamer walks home. The spider is in the corner. A whole moment of happiness. For the whole of a man's life.`},
{id:"alchemist",cat:"lit",bookTitle:"The Alchemist",author:"Paulo Coelho",region:"european",readTime:"10 min",year:"1988",words:839,preview:"A shepherd boy dreams of treasure at the Egyptian pyramids. He sells his sheep and crosses the desert. The treasure was at home all along. But the journey was the point.",summary:`Santiago is a shepherd boy in Andalusia. He has a recurring dream: a child leads him to the Egyptian pyramids and tells him he will find treasure there. He has the dream twice. He goes to a fortune-teller. She says: go to Egypt. He goes to an old king who sits on a bench in the town square. The king says: when you want something, all the universe conspires in helping you to achieve it. This is the novel's central idea. It is called the Personal Legend — the thing you were born to do, the path the universe has marked for you.

Santiago sells his sheep. He crosses the Strait of Gibraltar. He is robbed on his first day in Africa. He works in a crystal shop for nearly a year, learning Arabic, saving money. He joins a caravan crossing the Sahara to Egypt. In the caravan, he meets an Englishman who is studying alchemy — the science of turning lead into gold, which is also the science of turning the self into something purer.

In the desert oasis of Al-Fayoum, Santiago meets Fatima — a desert woman, beautiful, patient, who waits for the men to return from their journeys. He falls in love. He considers staying. Fatima tells him: go. Find your treasure. If you stay for me, you will hate me. If you go, you will carry me with you, and I will carry you. "If what one finds is made of pure matter, it will never spoil. And one can always come back."

Santiago meets the Alchemist — a mysterious figure who lives in the desert and knows the Language of the World. The Alchemist teaches Santiago to listen — to the wind, to the sun, to the sand, to the hawk that dives at a particular moment in a particular way. Everything speaks. Everything is connected. The universe has a soul — the Soul of the World — and it speaks to those who listen.

The Alchemist and Santiago ride into tribal territory. They are captured by warring tribesmen who will kill them unless Santiago performs a miracle. The Alchemist tells Santiago to become the wind. Santiago talks to the desert. He talks to the wind. He talks to the sun. Each one says: I cannot help you become the wind. Ask the one above me. Santiago prays. He is transformed — briefly, impossibly — into the wind itself. The tribesmen fall to their knees. Santiago and the Alchemist are released.

At the pyramids, Santiago digs. He finds nothing. Thieves arrive and beat him. He tells them about his dream. One of the thieves laughs: "I had a dream too — about treasure buried under a sycamore tree in a ruined church in Spain. But I'm not stupid enough to cross the desert because of a dream."

Santiago goes home. He digs under the sycamore tree in the ruined church where he used to sleep with his sheep. He finds the treasure. It was there all along. It was always there. He had to cross the desert, lose everything, learn the Language of the World, talk to the wind, and get beaten by thieves to learn that the treasure was under the tree where he started.

Coelho wrote it in two weeks, in 1987. It was published in Brazil in 1988, sold 900 copies, and was dropped by its publisher. A second publisher picked it up. It has since sold over 150 million copies in eighty languages, making it one of the bestselling books in history.

The novel has been loved by millions and dismissed by critics as simplistic, sentimental, and philosophically shallow. Both responses miss what it actually does. The Alchemist is not a novel in the way that Crime and Punishment or Moby-Dick is a novel. It is a parable — a fable — a story that operates on the logic of dreams, where everything is symbol and nothing needs to be explained. The shepherd is you. The desert is the difficulty. The treasure is the thing you were born to do. The journey home is the discovery that you already had what you needed.

Whether this is wisdom or platitude depends on where you are standing when you read it. A sixteen-year-old reading The Alchemist for the first time, feeling trapped in a life that was chosen for them, hearing for the first time that the universe might want them to pursue their own path — for that reader, the book is a door opening. A forty-year-old rereading it may find the door smaller than remembered.

Santiago carries the treasure home. Fatima is waiting. The wind still speaks. The sycamore tree still stands in the ruined church. The sheep have been sold. The dream was real. The fortune-teller was right. The old king on the bench was right. And the thief who laughed at dreams was also right — the treasure was at home. But Santiago had to leave home to find it. That is the trick. That is the alchemy.`},
{id:"thousand-nights",cat:"lit",bookTitle:"One Thousand and One Nights",author:"Anonymous",region:"middleeast",readTime:"16 min",year:"~9th-14th c.",words:1096,preview:"A king kills his wives at dawn. A woman saves herself by telling stories — one story inside another inside another, for a thousand and one nights. The stories save her life. They also save his soul.",summary:`King Shahryar discovers his wife's infidelity. The betrayal breaks something inside him — not his heart but his faith in the possibility of female virtue. He concludes that all women are faithless. His solution is methodical: each night he marries a virgin, sleeps with her, and has her executed at dawn. He does this for three years. The kingdom runs out of eligible women. Fathers hide their daughters. The city empties of girls.

Scheherazade is the daughter of the king's vizier — the man who carries out the executions. She is beautiful, well-read, and possessed of a library in her mind that contains a thousand stories. She volunteers to marry the king. Her father begs her not to. She insists. She has a plan.

On the wedding night, Scheherazade begins to tell a story. She tells it well — vividly, with suspense, with characters you want to follow. As dawn approaches, she stops. The story is unfinished. The king, who wants to know what happens next, delays the execution for one day. The next night, Scheherazade finishes the first story and begins a second. At dawn, she stops again. The king delays again.

This goes on for a thousand and one nights. Scheherazade nests stories inside stories — a character in one tale begins telling another tale, and a character in that tale tells a third, until the narrative architecture is a labyrinth of mirrors, each corridor leading to another corridor, each door opening to another door. The king cannot kill her because he cannot bear to lose the thread.

The stories span the entire world of medieval Islamic imagination. Merchants and djinn. Fishermen and kings. Thieves and princes. The tales range from bawdy farce to mystical parable, from adventure to meditation, from the streets of Baghdad to the courts of China.

A fisherman pulls a sealed jar from the sea. Inside is a djinn who has been imprisoned for four hundred years. The djinn has vowed to kill whoever frees him — not from malice but from fury at the world that imprisoned him. The fisherman outsmarts the djinn by tricking him back into the jar: "I don't believe you fit in there." The djinn, proud, demonstrates. The fisherman seals the jar. Power is defeated not by greater power but by wit.

A porter in Baghdad carries goods for three beautiful women and is invited to their house for a night of food, wine, and entertainment — on the condition that he asks no questions about anything he sees. He sees strange things. He asks questions. Chaos follows. The story spirals into other stories — each woman has a history, each history contains a catastrophe, each catastrophe was caused by curiosity or desire or the failure to keep a promise.

Sinbad the Sailor tells seven voyages — each one more impossible than the last. A valley of diamonds guarded by serpents. An island that turns out to be a sleeping whale. A burial chamber where Sinbad is entombed alive with his dead wife and survives by killing other widows and widowers and taking their food. The voyages are not moral tales. They are survival tales — the world is vast, dangerous, and indifferent, and the only virtue that matters is the refusal to stop moving.

Ali Baba discovers the cave of the forty thieves — "Open sesame!" — and takes their gold. His greedy brother Cassim goes back for more, forgets the magic word, and is cut to pieces by the thieves. Morgiana, Ali Baba's slave girl, saves the household through cunning — pouring boiling oil into the jars where the thieves are hiding, dancing with a dagger at a banquet and plunging it into the thief captain's heart. Morgiana is the story's true hero: a woman, a slave, who survives by being smarter and braver than every man in the room.

Aladdin is not a prince. He is a lazy boy in China whose mother despairs of him. A sorcerer gives him a magic lamp containing a djinn of limitless power. Aladdin uses the djinn to become wealthy, to marry a princess, to build a palace. The sorcerer returns and steals the lamp. The princess recovers it through her own cunning. The story, in its original form, is about the gap between having power and deserving it — and about the women who clean up the messes men make with their magic.

The stories are not innocent. They contain violence — beheadings, mutilations, torture. They contain sex — explicit, varied, and unapologetic. They contain slavery, which is presented as normal. They contain misogyny — many of the stories reinforce the idea that women are untrustworthy, which is, after all, the premise that started the cycle. But they also contain Scheherazade — a woman who uses intelligence, art, and narrative mastery to defeat a system designed to destroy her. She does not fight the king with a sword. She fights him with stories. And the stories work — not because they distract him but because they transform him. Over a thousand and one nights, the king who saw all women as faithless learns to see one woman as irreplaceable.

At the end, Scheherazade has borne the king three sons. She brings the children to him and says: these are your sons. Will you kill their mother? The king weeps. He has been cured — not of misogyny exactly, but of the despair that produced it. The stories taught him that the world is larger than his wound. That people are more complex than his categories. That a woman who can tell a thousand stories is not a type. She is Scheherazade.

The Nights were compiled over centuries — Arabic, Persian, Indian, and Egyptian tales gathered, translated, adapted, and layered over one another from the ninth to the fourteenth century. No single author wrote them. No single culture owns them. They are the collective imagination of the medieval Islamic world, filtered through generations of storytellers who understood that a story is not entertainment. A story is survival. Scheherazade proved it. She told stories to stay alive. The stories outlived the king, the kingdom, and the civilization that produced them.

Dawn comes. Scheherazade stops talking. The king says: tell me another. She always has another. That is the secret. Not the quality of any single story but the promise that there is always one more — that the human capacity for narrative is inexhaustible, that the well never runs dry, that as long as someone is telling a story, nobody dies.

The thousand and second night begins.`}];

// Build a hash string for the current state
function buildHash(v,d){
  if(v==='home')return '#home';
  if(v==='library')return '#library';
  if(v==='blog')return '#blog';
  if(v==='history')return '#history';
  if(v==='about')return '#about';
  if(v==='request')return '#request';
  if(v==='region'&&d)return '#region/'+encodeURIComponent(d.id);
  if(v==='author'&&d)return '#author/'+encodeURIComponent(d.ri)+'/'+encodeURIComponent(d.n.replace(/\s+/g,'-'));
  if(v==='retelling'&&d)return '#retelling/'+encodeURIComponent(d.id);
  if(v==='era')return '#era/'+cEra;
  return '#'+v;
}

// Navigate to a hash string and restore state
function restoreFromHash(hash){
  if(!hash||hash==='#'||hash===''){go('home');return;}
  var h=hash.replace(/^#/,'');
  var parts=h.split('/');
  var v=parts[0];
  if(v==='home'||v==='library'||v==='blog'||v==='history'||v==='about'||v==='request'){
    go(v);return;
  }
  if(v==='region'&&parts[1]){
    var rid=decodeURIComponent(parts[1]);
    for(var i=0;i<R.length;i++){if(R[i].id===rid){go('region',R[i]);return;}}
    go('home');return;
  }
  if(v==='author'&&parts[1]&&parts[2]){
    var rid=decodeURIComponent(parts[1]);
    var aname=decodeURIComponent(parts[2]).replace(/-/g,' ');
    for(var i=0;i<R.length;i++){
      if(R[i].id===rid){
        for(var j=0;j<R[i].a.length;j++){
          if(R[i].a[j].n.toLowerCase()===aname.toLowerCase()){
            var a=R[i].a[j];
            go('author',{n:a.n,y:a.y,o:a.o,b:a.b,p:a.p,rn:R[i].name,ri:R[i].id,re:R[i].emoji,rc:R[i].color});
            return;
          }
        }
        break;
      }
    }
    go('home');return;
  }
  if(v==='retelling'&&parts[1]){
    var rid=decodeURIComponent(parts[1]);
    for(var i=0;i<RT.length;i++){if(RT[i].id===rid){go('retelling',RT[i]);return;}}
    go('home');return;
  }
  if(v==='era'&&parts[1]!==undefined){
    var idx=parseInt(parts[1]);
    if(!isNaN(idx)&&ERAS[idx]){cView='era';cEra=idx;cReg=null;cAuth=null;cRet=null;document.getElementById('mob-nav').style.display='none';ren();window.scrollTo({top:0,behavior:'smooth'});return;}
  }
  go('home');
}

var _skipHashUpdate=false;

function go(v,d){
  cView=v;
  if(v==='region'){cReg=d;cAuth=null}
  else if(v==='author')cAuth=d;
  else if(v==='retelling')cRet=d;
  else{cReg=null;cAuth=null;cRet=null}
  document.getElementById('mob-nav').style.display='none';
  ren();
  window.scrollTo({top:0,behavior:'smooth'});
  document.querySelectorAll('.nl').forEach(e=>e.classList.toggle('active',e.dataset.p===v));
  if(!_skipHashUpdate){
    var h=buildHash(v,d);
    try{if(window.location.hash!==h)window.history.pushState({v:v},document.title,h);}catch(e){}
  }
}

window.addEventListener('popstate',function(){
  _skipHashUpdate=true;
  try{restoreFromHash(window.location.hash);}catch(e){}
  _skipHashUpdate=false;
});

function searchAll(q){
  var results=[];
  // Search retellings
  for(var i=0;i<RT.length;i++){
    var r=RT[i];
    if(r.bookTitle.toLowerCase().indexOf(q)>=0||r.author.toLowerCase().indexOf(q)>=0){
      results.push({type:'retelling',title:r.bookTitle,sub:r.author+' \u00b7 '+r.readTime,idx:i,score:r.bookTitle.toLowerCase().indexOf(q)===0?0:1});
    }
  }
  // Search authors and books in R
  for(var ri=0;ri<R.length;ri++){
    var reg=R[ri];
    for(var ai=0;ai<reg.a.length;ai++){
      var a=reg.a[ai];
      var nameMatch=a.n.toLowerCase().indexOf(q)>=0;
      if(nameMatch){
        results.push({type:'author',title:a.n,sub:a.y+' \u00b7 '+a.b.length+' works',regId:reg.id,aIdx:ai,score:a.n.toLowerCase().indexOf(q)===0?2:3});
      }
      for(var bi=0;bi<a.b.length;bi++){
        if(a.b[bi].toLowerCase().indexOf(q)>=0){
          results.push({type:'book',title:a.b[bi],sub:a.n,regId:reg.id,aIdx:ai,score:a.b[bi].toLowerCase().indexOf(q)===0?2:3});
        }
      }
    }
  }
  // Search HIST works
  for(var ci=0;ci<HIST.length;ci++){
    for(var wi=0;wi<HIST[ci].works.length;wi++){
      var w=HIST[ci].works[wi];
      if(w.title.toLowerCase().indexOf(q)>=0||w.author.toLowerCase().indexOf(q)>=0){
        // Check if already in results via RT
        var dup=false;
        for(var d=0;d<results.length;d++){if(results[d].title===w.title){dup=true;break;}}
        if(!dup)results.push({type:'book',title:w.title,sub:w.author+' \u00b7 '+w.origin,regId:'',aIdx:0,score:4});
      }
    }
  }
  // Sort: retellings first, then by score
  results.sort(function(a,b){
    if(a.type==='retelling'&&b.type!=='retelling')return -1;
    if(b.type==='retelling'&&a.type!=='retelling')return 1;
    return a.score-b.score;
  });
  return results;
}

var ttsUtterance=null,ttsParagraphs=[],ttsIdx=0,ttsPlaying=false,ttsRate=1,ttsTitle='';

function ttsStart(title,text){
  if(!('speechSynthesis' in window)){alert('Your browser does not support text-to-speech.');return;}
  ttsStop();
  ttsTitle=title;
  // Split text into paragraphs for navigation
  ttsParagraphs=text.split(/\n\n+/).filter(function(p){return p.trim().length>20;});
  ttsIdx=0;
  ttsPlaying=true;
  document.getElementById('tts-bar').style.display='flex';
  document.getElementById('tts-title').textContent=title;
  document.getElementById('tts-play').innerHTML='&#10074;&#10074;';
  ttsSpeakCurrent();
}

function ttsSpeakCurrent(){
  if(ttsIdx>=ttsParagraphs.length){ttsStop();return;}
  window.speechSynthesis.cancel();
  ttsUtterance=new SpeechSynthesisUtterance(ttsParagraphs[ttsIdx]);
  ttsUtterance.rate=ttsRate;
  ttsUtterance.lang='en-US';
  // Try to pick a good voice
  var voices=window.speechSynthesis.getVoices();
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].name.indexOf('Google')>=0&&voices[vi].lang.indexOf('en')>=0){ttsUtterance.voice=voices[vi];break;}
    if(voices[vi].name.indexOf('Samantha')>=0){ttsUtterance.voice=voices[vi];break;}
  }
  ttsUtterance.onend=function(){
    if(ttsPlaying){ttsIdx++;ttsSpeakCurrent();}
  };
  var paraNum=ttsIdx+1;
  var total=ttsParagraphs.length;

function ttsToggle(){

+'<div style="flex:1;min-width:260px">'
+'<p class="mono" style="margin-bottom:6px;letter-spacing:.2em">THE AUTHOR</p>'
+'<h2 style="font-size:28px;font-weight:400;color:var(--text-bright);margin-bottom:4px">Ziyoviddin Sirojiddinov</h2>'
+'<p class="bt" style="font-size:13px;margin-bottom:16px;color:var(--gold)">FDT 101 \u00b7 TMCI \u00b7 Tashkent</p>'
+'<div class="bt" style="font-size:15px;line-height:1.85">'
+'<p style="margin-bottom:14px">I grew up around books I never finished. Not because I didn\u2019t care \u2014 because they were eight hundred pages long, and life is short, and nobody tells you that the real barrier to reading isn\u2019t laziness. It\u2019s time.</p>'
+'<p style="margin-bottom:14px">Somewhere between Dostoevsky\u2019s third subplot and Tolstoy\u2019s second epilogue, I thought: what if someone just told you the story? Not a summary \u2014 summaries are dead. But the actual story, with its weight and its beauty and its gut punches, in a form you could finish in one sitting.</p>'
+'<p style="margin-bottom:14px">That\u2019s what Literator is. Every retelling on this site is written to be faithful to the original \u2014 the characters, the plot, the feeling \u2014 while being short enough to read on a bus or before bed. I want people who will never pick up a 600-page Russian novel to know what happens inside it. I want someone in Tashkent to read the Iliad on their phone and feel what Homer felt three thousand years ago.</p>'
+'<p>The world\u2019s greatest stories belong to everyone. Not just to people with time, money, and a university library card. To everyone.</p>'
+'</div></div></div>'

<script>
(function(){
  function initDragScroll(el){
    if(!el)return;
    var isDown=false,startX,scrollLeft;
    el.addEventListener('mousedown',function(e){isDown=true;el.style.cursor='grabbing';startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;});
    el.addEventListener('mouseleave',function(){isDown=false;el.style.cursor='grab';});
    el.addEventListener('mouseup',function(){isDown=false;el.style.cursor='grab';});
    el.addEventListener('mousemove',function(e){if(!isDown)return;e.preventDefault();var x=e.pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX);});
  }
  function tryInitExplore(){var g=document.getElementById('explore-grid');if(g)initDragScroll(g);else setTimeout(tryInitExplore,200);}
  tryInitExplore();
  document.addEventListener('ren',function(){setTimeout(function(){initDragScroll(document.getElementById('explore-grid'));},100);});
})();
(function(){
  function positionNavGlider(){
    var active=document.querySelector('nav.desk .nl.active');
    var glider=document.querySelector('.nav-glider');
    if(!active||!glider)return;
    var navRect=active.closest('nav').getBoundingClientRect();
    var btnRect=active.getBoundingClientRect();
    glider.style.left=(btnRect.left-navRect.left)+'px';
    glider.style.width=btnRect.width+'px';
  }
  function initNavGlider(){
    var nav=document.querySelector('nav.desk');
    if(!nav)return;
    new MutationObserver(positionNavGlider).observe(nav,{attributes:true,attributeFilter:['class'],subtree:true});
    positionNavGlider();
    window.addEventListener('resize',positionNavGlider);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initNavGlider);
  else initNavGlider();
})();
(function(){
  document.addEventListener('mousemove',function(e){
    var btn=e.target.closest('.btn,.theme-btn');
    if(!btn)return;
    var r=btn.getBoundingClientRect();
    btn.style.setProperty('--gleam-x',(e.clientX-r.left)+'px');
  });
  document.addEventListener('mouseout',function(e){
    var btn=e.target.closest('.btn,.theme-btn');
    if(btn&&!btn.contains(e.relatedTarget))btn.style.removeProperty('--gleam-x');
  });
})();
</script>
